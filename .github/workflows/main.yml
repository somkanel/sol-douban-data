name: douban sync

on:
  schedule:
    # GitHub cron 使用 UTC，15:05 UTC ≈ 23:05 北京时间
    - cron: "5 15 * * *"

  # 通过 watch-douban.yml 或手动触发
  workflow_dispatch:
    inputs:
      triggered_by:
        description: '触发来源'
        required: false
        default: 'manual'
        type: string

concurrency:
  group: douban-sync
  cancel-in-progress: true

permissions:
  contents: write
  actions: read

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Reset data directory
        shell: bash
        run: |
          set -Eeuo pipefail
          rm -rf ./data
          mkdir -p ./data

      - name: Movie Sync (JSON only)
        uses: lizheming/doumark-action@master
        with:
          id: somkanel
          type: movie
          format: json
          dir: ./data
          cookie: ${{ secrets.DOUBAN_COOKIE }}

      - name: Debug status
        shell: bash
        run: |
          set -Eeuo pipefail
          echo "=== data files ==="
          ls -lah ./data || true
          echo "=== git status ==="
          git status --porcelain=v1
          echo "=== git diff (stat) ==="
          git diff --stat || true

      - name: Commit and Push
        uses: EndBug/add-and-commit@v9
        with:
          message: "chore: update douban data"
          add: "./data"
          default_author: github_actions

      - name: Trigger sol-douban-images workflow
        if: success()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.IMAGE_SYNC_PAT }}
          script: |
            console.log("🚀 触发 sol-douban-images 海报同步...");
            await github.rest.actions.createWorkflowDispatch({
              owner: 'somkanel',
              repo: 'sol-douban-images',
              workflow_id: 'sync-images.yml',
              ref: 'main'
            });
            console.log("✅ 已成功触发海报同步 workflow");
