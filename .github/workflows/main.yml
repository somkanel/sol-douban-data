name: douban sync

on:
  schedule:
    - cron: "0 1 * * *"     # 北京时间 09:00
    - cron: "0 5 * * *"     # 北京时间 13:00
    - cron: "0 9 * * *"     # 北京时间 17:00
    - cron: "0 14 * * *"    # 北京时间 22:00
  workflow_dispatch:

concurrency:
  group: douban-sync
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Reset data directory
        shell: bash
        run: |
          set -Eeuo pipefail
          rm -rf ./data
          mkdir -p ./data

      - name: Movie Sync with Retry
        id: sync
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 6
          max_attempts: 3
          retry_on: error
          command: |
            echo "🔄 第 ${{ steps.sync.outputs.attempt }} 次尝试同步..."

            docker run --rm \
              -e DOUBAN_ID=somkanel \
              -e DOUBAN_TYPE=movie \
              -e DOUBAN_FORMAT=json \
              -e DOUBAN_DIR=./data \
              -e DOUBAN_COOKIE="${{ secrets.DOUBAN_COOKIE }}" \
              ghcr.io/lizheming/doumark-action:latest

            COUNT=$(jq 'length' ./data/movie.json || echo 0)
            echo "本次同步获得 ${COUNT} 条记录"

            if [ "$COUNT" -ge 800 ]; then
              echo "✅ 数据量合格 (${COUNT} 条)"
              echo "success=true" >> $GITHUB_OUTPUT
              echo "count=$COUNT" >> $GITHUB_OUTPUT
            else
              echo "❌ 数据量不足 (${COUNT} 条 < 800)，准备重试"
              echo "success=false" >> $GITHUB_OUTPUT
              echo "count=$COUNT" >> $GITHUB_OUTPUT
              exit 1
            fi

      - name: Debug status
        shell: bash
        run: |
          set -Eeuo pipefail
          echo "=== data files ==="
          ls -lah ./data || true
          echo "=== git status ==="
          git status --porcelain=v1
          echo "=== git diff (stat) ==="
          git diff --stat || true

      - name: Commit and Push
        if: steps.sync.outputs.success == 'true'
        uses: EndBug/add-and-commit@v9
        with:
          message: "chore: update douban data"
          add: "./data"
          default_author: github_actions

      - name: Trigger sol-douban-images workflow
        if: steps.sync.outputs.success == 'true' && success()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.IMAGE_SYNC_PAT }}
          script: |
            console.log("🚀 数据校验通过，触发海报同步...");
            await github.rest.actions.createWorkflowDispatch({
              owner: 'somkanel',
              repo: 'sol-douban-images',
              workflow_id: 'sync-images.yml',
              ref: 'main'
            });
            console.log("✅ 已成功触发海报同步 workflow");
