name: douban sync

on:
  schedule:
    - cron: "0 1 * * *"     # 北京时间 09:00
    - cron: "0 5 * * *"     # 北京时间 13:00
    - cron: "0 9 * * *"     # 北京时间 17:00
    - cron: "0 14 * * *"    # 北京时间 22:00
  workflow_dispatch:

concurrency:
  group: douban-sync
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4   # v4 已经支持较新版本，但我们明确指定

      - name: Reset data directory
        shell: bash
        run: |
          set -Eeuo pipefail
          rm -rf ./data
          mkdir -p ./data

      - name: Movie Sync (JSON only)
        uses: lizheming/doumark-action@master
        with:
          id: somkanel
          type: movie
          format: json
          dir: ./data
          cookie: ${{ secrets.DOUBAN_COOKIE }}

      - name: Debug status
        shell: bash
        run: |
          set -Eeuo pipefail
          echo "=== data files ==="
          ls -lah ./data || true
          echo "=== git status ==="
          git status --porcelain=v1
          echo "=== git diff (stat) ==="
          git diff --stat || true

      - name: Commit and Push
        uses: EndBug/add-and-commit@v9
        with:
          message: "chore: update douban data"
          add: "./data"
          default_author: github_actions

      - name: Trigger sol-douban-images workflow
        if: success()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.IMAGE_SYNC_PAT }}
          script: |
            console.log("🚀 触发 sol-douban-images 海报同步...");
            await github.rest.actions.createWorkflowDispatch({
              owner: 'somkanel',
              repo: 'sol-douban-images',
              workflow_id: 'sync-images.yml',
              ref: 'main'
            });
            console.log("✅ 已成功触发海报同步 workflow")
