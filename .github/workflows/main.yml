name: douban sync

on:
  schedule:
    - cron: "5 15 * * *"

  workflow_dispatch:
    inputs:
      triggered_by:
        description: '触发来源'
        required: false
        default: 'manual'
        type: string

concurrency:
  group: douban-sync
  cancel-in-progress: true

permissions:
  contents: write
  actions: read

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync with Retry
        id: sync
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 5
          max_attempts: 3
          retry_on: error
          command: |
            rm -rf ./data
            mkdir -p ./data
            
            echo "🔄 第 ${{ steps.sync.outputs.attempt }} 次尝试同步..."
            
            docker run --rm \
              -e DOUBAN_ID=somkanel \
              -e DOUBAN_TYPE=movie \
              -e DOUBAN_FORMAT=json \
              -e DOUBAN_DIR=./data \
              -e DOUBAN_COOKIE="${{ secrets.DOUBAN_COOKIE }}" \
              ghcr.io/lizheming/doumark-action:latest

            COUNT=$(jq 'length' data/movie.json || echo 0)
            echo "本次同步获得 ${COUNT} 条记录"
            
            if [ "$COUNT" -ge 800 ]; then
              echo "✅ 数据量合格 (${COUNT} 条)"
              echo "success=true" >> $GITHUB_OUTPUT
              echo "count=$COUNT" >> $GITHUB_OUTPUT
            else
              echo "❌ 数据量不足 (${COUNT} 条 < 800)"
              echo "success=false" >> $GITHUB_OUTPUT
              echo "count=$COUNT" >> $GITHUB_OUTPUT
              exit 1
            fi

      - name: Commit and Push
        if: steps.sync.outputs.success == 'true'
        uses: EndBug/add-and-commit@v9
        with:
          message: "chore: update douban data"
          add: "./data"
          default_author: github_actions

      - name: Trigger sol-douban-images workflow
        if: steps.sync.outputs.success == 'true' && success()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.IMAGE_SYNC_PAT }}
          script: |
            console.log("🚀 数据校验通过，触发海报同步...");
            await github.rest.actions.createWorkflowDispatch({
              owner: 'somkanel',
              repo: 'sol-douban-images',
              workflow_id: 'sync-images.yml',
              ref: 'main'
            });
            console.log("✅ 已成功触发海报同步 workflow");

      - name: Final Status
        if: always()
        run: |
          if [ "${{ steps.sync.outputs.success }}" = "true" ]; then
            echo "🎉 同步成功，最终获得 ${{ steps.sync.outputs.count }} 条记录"
          else
            echo "❌ 同步失败！已重试 ${{ steps.sync.outputs.attempt }} 次，最终只有 ${{ steps.sync.outputs.count }} 条记录"
            exit 1
          fi
