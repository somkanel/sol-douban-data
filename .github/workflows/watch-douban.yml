name: watch douban for new movies

on:
  schedule:
    - cron: "0 * * * *"      # 每小时整点运行
  workflow_dispatch:

concurrency:
  group: watch-douban
  cancel-in-progress: true

permissions:
  contents: read
  actions: write

jobs:
  check-for-updates:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get last local create_time
        id: local
        run: |
          if [ -f "data/movie.json" ]; then
            LAST_TIME=$(jq -r '.[0].create_time // ""' data/movie.json)
            echo "last_local=$LAST_TIME" >> $GITHUB_OUTPUT
            echo "📅 本地最新记录时间: $LAST_TIME"
          else
            echo "last_local=" >> $GITHUB_OUTPUT
            echo "⚠️ 本地 movie.json 不存在"
          fi

      - name: Fetch latest from Douban
        id: douban
        run: |
          echo "🔍 正在从豆瓣获取最新观影记录..."
          
          # 使用更稳定的接口（你的 doumark-action 内部实际使用的类似接口）
          curl -s -f -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
            -H "Referer: https://www.douban.com/" \
            "https://www.douban.com/j/iread/review/list?start=0&count=5&status=done&type=movie&uid=somkanel" \
            > latest.json
          
          echo "=== 返回状态码和数据预览 ==="
          ls -l latest.json
          head -c 500 latest.json || cat latest.json
          
          # 尝试提取时间
          LATEST_TIME=$(jq -r '.reviews[0].create_time // .interests[0].create_time // ""' latest.json)
          
          if [ -z "$LATEST_TIME" ]; then
            echo "⚠️ 无法解析时间，尝试备用字段..."
            LATEST_TIME=$(jq -r '.reviews[0].updated // ""' latest.json)
          fi
          
          echo "latest_douban=$LATEST_TIME" >> $GITHUB_OUTPUT
          echo "📡 豆瓣最新记录时间: $LATEST_TIME"
          
          # 调试输出
          echo "=== 前两条记录标题 ==="
          jq -r '.reviews[0:2] | .[] | "\(.create_time // "N/A") - \(.title // .subject.title // "无标题")"' latest.json || true
          
          rm -f latest.json


      - name: Compare times
        id: decide
        run: |
          LOCAL="${{ steps.local.outputs.last_local }}"
          DOUBAN="${{ steps.douban.outputs.latest_douban }}"
          
          echo "本地最后时间: $LOCAL"
          echo "豆瓣最新时间: $DOUBAN"
          
          if [ -n "$DOUBAN" ] && [ "$DOUBAN" \> "$LOCAL" ]; then
            echo "has_new=true" >> $GITHUB_OUTPUT
            echo "🎉 发现新观影记录！即将触发全量同步。"
          else
            echo "has_new=false" >> $GITHUB_OUTPUT
            echo "✅ 暂无新记录"
          fi

      - name: Trigger full sync
        if: steps.decide.outputs.has_new == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            console.log("🚀 检测到新电影，触发 douban sync workflow...");
            await github.rest.actions.createWorkflowDispatch({
              owner: 'somkanel',
              repo: 'sol-douban-data',
              workflow_id: 'main.yml',
              ref: 'main',
              inputs: { triggered_by: 'watcher' }
            });
