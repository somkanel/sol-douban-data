name: watch douban for new movies

on:
  schedule:
    - cron: "0 * * * *"      # 每小时整点检测
  workflow_dispatch:

concurrency:
  group: watch-douban
  cancel-in-progress: true

permissions:
  contents: read
  actions: write

jobs:
  check-for-updates:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get last local create_time
        id: local
        run: |
          if [ -f "data/movie.json" ] && [ -s "data/movie.json" ]; then
            LAST_TIME=$(jq -r '.[0].create_time // ""' data/movie.json)
            echo "last_local=$LAST_TIME" >> $GITHUB_OUTPUT
            echo "📅 本地最新记录时间: $LAST_TIME"
          else
            echo "last_local=2000-01-01 00:00:00" >> $GITHUB_OUTPUT
            echo "⚠️ 本地无数据，使用初始时间作为对比"
          fi

      - name: Fetch latest 5 records from Douban
        id: fetch
        uses: lizheming/doumark-action@master
        with:
          id: somkanel
          type: movie
          format: json
          dir: ./temp_check
          count: 5
          cookie: ${{ secrets.DOUBAN_COOKIE }}

      - name: Compare with local data
        id: decide
        run: |
          if [ ! -f "./temp_check/movie.json" ] || [ ! -s "./temp_check/movie.json" ]; then
            echo "❌ 未能获取到豆瓣数据"
            echo "has_new=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          DOUBAN_TIME=$(jq -r '.[0].create_time // ""' ./temp_check/movie.json)
          LOCAL_TIME="${{ steps.local.outputs.last_local }}"

          echo "本地最新时间: $LOCAL_TIME"
          echo "豆瓣最新时间: $DOUBAN_TIME"

          if [ -n "$DOUBAN_TIME" ] && [ "$DOUBAN_TIME" \> "$LOCAL_TIME" ]; then
            echo "🎉 检测到新观影记录！将触发全量同步。"
            echo "has_new=true" >> $GITHUB_OUTPUT
          else
            echo "✅ 暂无新记录"
            echo "has_new=false" >> $GITHUB_OUTPUT
          fi

      - name: Trigger full sync if new records found
        if: steps.decide.outputs.has_new == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            console.log("🚀 检测到新电影，触发完整同步 workflow...");
            await github.rest.actions.createWorkflowDispatch({
              owner: 'somkanel',
              repo: 'sol-douban-data',
              workflow_id: 'main.yml',
              ref: 'main',
              inputs: { triggered_by: 'watcher' }
            });

      - name: Cleanup
        if: always()
        run: rm -rf ./temp_check
