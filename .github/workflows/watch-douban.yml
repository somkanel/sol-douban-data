name: watch douban for new movies

on:
  schedule:
    - cron: "0 * * * *"        # 每小时整点运行（北京时间约每小时1次）
  workflow_dispatch:           # 支持手动触发测试

concurrency:
  group: watch-douban
  cancel-in-progress: true

permissions:
  contents: read
  actions: write               # 需要权限触发其他 workflow

jobs:
  check-for-updates:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get last local create_time
        id: local
        run: |
          if [ -f "data/movie.json" ]; then
            LAST_TIME=$(jq -r '.[0].create_time // empty' data/movie.json)
            echo "last_local_time=$LAST_TIME" >> $GITHUB_OUTPUT
            echo "📅 本地最新标记时间: $LAST_TIME"
          else
            echo "last_local_time=" >> $GITHUB_OUTPUT
            echo "⚠️ 本地 movie.json 不存在"
          fi

      - name: Fetch latest from Douban
        id: douban
        run: |
          curl -s "https://m.douban.com/rexxar/api/v2/user/somkanel/interests?type=movie&status=done&count=1" \
            -H "User-Agent: Mozilla/5.0" \
            -H "Referer: https://www.douban.com" > latest.json
          
          LATEST_TIME=$(jq -r '.interests[0].create_time // empty' latest.json)
          echo "latest_douban_time=$LATEST_TIME" >> $GITHUB_OUTPUT
          
          echo "📡 豆瓣最新标记时间: $LATEST_TIME"
          rm -f latest.json

      - name: Compare times and decide
        id: decide
        run: |
          LOCAL="${{ steps.local.outputs.last_local_time }}"
          DOUBAN="${{ steps.douban.outputs.latest_douban_time }}"
          
          echo "本地时间: $LOCAL"
          echo "豆瓣时间: $DOUBAN"
          
          if [ -n "$DOUBAN" ] && [ "$DOUBAN" \> "$LOCAL" ]; then
            echo "has_new=true" >> $GITHUB_OUTPUT
            echo "🎉 检测到新观影记录！将触发同步。"
          else
            echo "has_new=false" >> $GITHUB_OUTPUT
            echo "✅ 没有新记录，无需同步。"
          fi

      - name: Trigger full sync if needed
        if: steps.decide.outputs.has_new == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            console.log("🚀 检测到新电影，开始触发完整同步...");
            await github.rest.actions.createWorkflowDispatch({
              owner: 'somkanel',
              repo: 'sol-douban-data',
              workflow_id: 'main.yml',
              ref: 'main',
              inputs: { triggered_by: 'watch' }
            });
